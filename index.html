<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Iluminação</title>
    <!-- CSS -->
     <link rel="stylesheet" href="css/reset.css">
     <link rel="stylesheet" href="css/theme.css">
     <link rel="stylesheet" href="css/components.css">
     <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <header class="topbar">
        <h1>Controle de Iluminação</h1>
        <div class="user">
            Usuario: <strong>Operador</strong>
        </div>
    </header>

    <main class="container">
        <aside class="sidebar">
            <button id="btnCatalog" class="btn">Catlogo</button>
            <button id="btnNewReserv" class="btn">Nova Reserva</button>
            <button id="btnReservations" class="btn">Reservas</button>
        </aside>

        <section clas="content">
            <div id="catalogview" class="view">
                <h2>Catálogo</h2>
                <div id="catalogList" clas="grid"></div>
                <button id="btnAddSample" class="btn secondary">Adicionar itens de exemplo</button>

            </div>

            <div id="newView" class="view .hidden">
                <h2>Nova Reserva</h2>
                <form id="reservForm" class="card">
                    <label>Cliente <input name="client" requered></label>
                    <label>Local <input name="location" required></label>
                    <label>Data <input type="date" name="date" required></label>

                    <div class="intemsBlock">
                        <h3>Itens</h3>
                        <div class="row">
                            <select name="itemSelect"></select>
                            <input id="intemQty" type="number" min="1" value="1">
                            <button id="addItemBtn" type="button" class="btn">Adicionar</button>
                        </div>
                        <ul id="selectedItems" class="list"></ul>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn primary">Confirmar</button>
                        <button id="cancelReserv" type="button" class="btn">Cancelar</button>
                    </div>
                </form>
            </div>

            <div id="reservationView" class="view">
                <h2>Reservas</h2>
                <div id="reservationslist"></div>
            </div>
        </section>
    </main>

<footer class="footer">Protótipo • Dados no navegador</footer>

<!-- JS separados -->
 <script src="js/catalog.js"></script>
<script src="js/reservations.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>

</html>
